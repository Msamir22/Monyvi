appId: com.monyvi.app
---
# CI helper: authenticate through the guarded E2E deep link to avoid flaky
# Android keyboard input in the sign-in form.

- openLink: "${MAESTRO_E2E_AUTH_DEEPLINK}"

- extendedWaitUntil:
    visible:
      "Choose your primary currency|Auto-Track Transactions|Transactions|Accounts|Open menu|Good
      Morning|Good Afternoon|Good Evening"
    timeout: 180000

- runFlow:
    when:
      visible: "Choose your primary currency"
    commands:
      - tapOn: "Confirm"
      - extendedWaitUntil:
          visible:
            "Auto-Track Transactions|Transactions|Accounts|Open menu|Good
            Morning|Good Afternoon|Good Evening"
          timeout: 120000

- runFlow:
    when:
      visible: "Auto-Track Transactions"
    commands:
      - tapOn: "Not Now"
      - extendedWaitUntil:
          visible:
            "Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good
            Evening"
          timeout: 120000

- extendedWaitUntil:
    visible:
      "Transactions|Accounts|Open menu|Good Morning|Good Afternoon|Good Evening"
    timeout: 120000
